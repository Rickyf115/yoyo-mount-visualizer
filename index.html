<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>String Trick Engine — Mount Visualizer</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      html, body, #root { height: 100%; }
      body {
        font-family: system-ui, sans-serif;
        background: #15181d;
        color: #e6e6e6;
      }
      .app { display: flex; flex-direction: column; height: 100%; }
      header {
        display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
        padding: 0.6rem 1rem; background: #1e232b; border-bottom: 1px solid #313845;
      }
      header h1 { font-size: 1rem; font-weight: 600; margin-right: 0.5rem; }
      select, button {
        background: #2a303b; color: #e6e6e6; border: 1px solid #3d4554;
        border-radius: 6px; padding: 0.3rem 0.6rem; font-size: 0.9rem; cursor: pointer;
      }
      .presets { display: flex; gap: 0.25rem; }
      .presets button.active { background: #3f5978; border-color: #5b7ea8; }
      .spin { font-size: 0.8rem; padding: 0.15rem 0.5rem; border-radius: 999px; }
      .spin-side { background: #2e4a3a; color: #9fd8b4; }
      .spin-front { background: #4a3a2e; color: #d8bd9f; }
      .walk { font-size: 0.78rem; color: #9aa7bd; }
      .timeline { padding-top: 0; border-bottom: 1px solid #313845; }
      .group-label {
        font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em;
        color: #6b7688; margin-left: 0.4rem;
      }
      .timeline input[type="range"] { width: 180px; accent-color: #5b7ea8; }
      .now { font-size: 0.82rem; color: #c8d2e2; }
      .physics { font-size: 0.82rem; color: #9aa7bd; display: flex; gap: 0.3rem; align-items: center; }
      button:disabled { opacity: 0.4; cursor: default; }
      .body { flex: 1; min-height: 0; display: flex; }
      .elements {
        width: 230px; overflow-y: auto; padding: 0.6rem;
        background: #1a1f26; border-right: 1px solid #313845;
        display: flex; flex-direction: column; gap: 0.45rem;
      }
      .elements h2 {
        font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
        color: #6b7688; font-weight: 600;
      }
      .element button {
        width: 100%; display: flex; justify-content: space-between; align-items: center;
        gap: 0.5rem; text-align: left;
      }
      .element small { display: block; color: #77839a; font-size: 0.68rem; padding: 0.15rem 0.1rem 0; }
      .element.illegal small { color: #5d6675; font-style: italic; }
      .difficulty { color: #d8bd7f; font-size: 0.6rem; letter-spacing: 0.1em; }
      main { flex: 1; min-height: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/viz/main.tsx"></script>
  </body>
</html>
